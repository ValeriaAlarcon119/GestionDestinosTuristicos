services:
  # ── 1. API Backend (Web Service con Docker) ──────────────────────────────
  - type: web
    name: gestiondestinosapi
    runtime: docker
    dockerfilePath: ./HotelBediaX.Api/Dockerfile
    dockerContext: ./HotelBediaX.Api
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: FRONTEND_URL
        value: https://gestiondestinosturisticos.onrender.com

